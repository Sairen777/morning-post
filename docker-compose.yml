services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: morningpost
      POSTGRES_PASSWORD: morningpost
      POSTGRES_DB: morningpost
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
